<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My AR Scene</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-marker preset="hiro">
 <a-scene embedded arjs>
  <a-marker preset="hiro">
  <a-gltf-model
    src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/refs/heads/main/Models/ToyCar/glTF/ToyCar.gltf"
    position="0 0 0"
    rotation="-90 0 0"
    scale="15 15 15"
    
    animation="property: rotation;
             to: 0 360 0;
             loop: true;
             dur: 3000;
             easing: linear">
  </a-gltf-model>
</a-marker>
    <a-box position="0 0.5 0" color="tomato"></a-box>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>
</a-marker>
  </body>
</html>
